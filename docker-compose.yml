version: '3.8'
services:
  minio:
    image: quay.io/minio/minio:latest
    container_name: minio_local
    ports:
      - "9000:9000" # API S3
      - "9001:9001" # Consola Web
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

volumes:
  minio_data: