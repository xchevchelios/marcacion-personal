services:
  minio:
    image: quay.io/minio/minio:latest
    container_name: minio_local
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  postgres:
    image: postgis/postgis:15-3.4
    container_name: postgres_gis
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: marcacion_db
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  frontend:
    image: node:24-alpine
    container_name: frontend_svelte
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - ./frontend-svelte:/app
      - yarn_cache:/usr/local/share/.cache/yarn
    command: sh -c "corepack enable && yarn install && yarn dev --host 0.0.0.0"

volumes:
  minio_data:
  pg_data:
  yarn_cache:
