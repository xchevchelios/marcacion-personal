minio.url=http://127.0.0.1:9000
minio.access-key=minioadmin
minio.secret-key=minioadmin
minio.bucket=evidencias-marcaciones
# Aumentar límite de tamaño para subida de fotos binarias
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Conexión a PostgreSQL
spring.datasource.url=jdbc:postgresql://127.0.0.1:5432/marcacion_db
spring.datasource.username=postgres
spring.datasource.password=admin

# Forzar el driver correcto (mata al fantasma de H2)
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate: ddl-auto set to update, Flyway handles migrations first
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Flyway configuration for database migrations
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true