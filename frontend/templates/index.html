<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EPESA — Iniciar Sesión</title>
  <link rel="stylesheet" href="../css/style.css" />
  <script src="../js/config.js"></script>
</head>
<body class="login-page">

  <div class="login-card">

    <div class="login-logo">
      <div class="login-logo-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2">
          <rect x="2" y="3" width="20" height="14" rx="2"/>
          <path d="M8 21h8M12 17v4M7 8h10M7 12h6"/>
        </svg>
      </div>
      <div>
        <h1>EPESA</h1>
        <p>Sistema de Gestión de Asistencias</p>
      </div>
    </div>

    <div class="login-tagline">
      <h2>Bienvenido de vuelta</h2>
      <p>Ingresá tus credenciales para acceder al sistema</p>
    </div>

    <div id="error-msg" class="error-message hidden"></div>

    <form id="login-form" novalidate>
      <div class="form-group">
        <label for="correo">Correo electrónico</label>
        <input
          type="email"
          id="correo"
          placeholder="usuario@epesa.com.py"
          autocomplete="email"
          required
        />
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <input
          type="password"
          id="password"
          placeholder="••••••••"
          autocomplete="current-password"
          required
        />
      </div>

      <button type="submit" id="btn-login" class="btn-primary">
        <span id="btn-text">Ingresar</span>
        <span id="btn-spinner" class="spinner hidden"></span>
      </button>
    </form>

    <p class="login-footer">EPESA &copy; 2025 — Acceso restringido a personal autorizado</p>
  </div>

  <script src="../js/auth.js"></script>
</body>
</html>
